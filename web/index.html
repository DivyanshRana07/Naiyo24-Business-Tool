<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder used by the build system.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Naiyo24 Business Tool - Smart invoicing and business management for modern businesses.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Naiyo24">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Preload Critical Assets -->
  <link rel="preload" href="assets/images/naiyo24_logo.png" as="image" onerror="this.style.display='none'">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <title>Naiyo24 Business Tool</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash screen while Flutter loads */
    body {
      margin: 0;
      background-color: #FAFAFC;
      font-family: 'Inter', sans-serif;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }

    #loading .logo {
      font-size: 32px;
      font-weight: 800;
      color: #6C3CE1;
    }

    #loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #EDE8FF;
      border-top-color: #6C3CE1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">Naiyo24</div>
    <div class="spinner"></div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loadingEl = document.getElementById('loading');
      if (loadingEl) loadingEl.style.display = 'none';
    });

    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            renderer: "canvaskit"
          }).then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
